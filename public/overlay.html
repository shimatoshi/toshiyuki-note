<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>としゆきノート</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: #1a1a1a; color: #e0e0e0;
  font-family: -apple-system, sans-serif; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.container { display: flex; flex-direction: column; height: 100%; }

/* Header */
.header {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 6px; flex-shrink: 0; background: #222;
  border-bottom: 1px solid #333;
}
.header select {
  flex: 1; background: #2a2a2a; color: #e0e0e0;
  border: 1px solid #444; border-radius: 4px;
  padding: 3px 4px; font-size: 12px; min-width: 0;
}
.page-nav {
  display: flex; align-items: center; gap: 2px;
  font-size: 11px; color: #888;
}
.btn {
  background: #333; color: #ccc; border: none; border-radius: 4px;
  padding: 4px 8px; font-size: 12px; cursor: pointer;
  touch-action: manipulation;
}
.btn:active { background: #555; }
.btn-primary { background: #1E88E5; color: white; }
.btn-primary:active { background: #1565C0; }
.btn-green { background: #43A047; color: white; }
.btn-icon { padding: 4px 6px; font-size: 14px; }

/* Editor */
.editor-wrap { flex: 1; position: relative; overflow: hidden; }
textarea {
  width: 100%; height: 100%; background: #222; color: #e0e0e0;
  border: none; padding: 6px 8px; font-size: 15px; line-height: 2.0;
  resize: none; outline: none; font-family: inherit;
}
textarea.ruled {
  background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size: 100% 2.0em;
  background-attachment: local;
}

/* Footer */
.footer {
  display: flex; align-items: center; gap: 2px;
  padding: 3px 6px; flex-shrink: 0; background: #222;
  border-top: 1px solid #333;
}
.footer-left { font-size: 10px; color: #666; flex-shrink: 0; }
.footer-right { display: flex; gap: 2px; margin-left: auto; }

/* Attachments bar */
.att-bar {
  display: flex; gap: 4px; padding: 4px 6px; background: #252525;
  overflow-x: auto; flex-shrink: 0; border-top: 1px solid #333;
}
.att-bar:empty { display: none; }
.att-thumb {
  width: 40px; height: 40px; border-radius: 4px; background: #333;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #aaa; overflow: hidden; position: relative; cursor: pointer;
}
.att-thumb img { width: 100%; height: 100%; object-fit: cover; }
.att-badge {
  position: absolute; top: 0; right: 0; background: #1E88E5;
  color: white; font-size: 8px; padding: 0 3px; border-radius: 0 4px 0 4px;
}

/* Search overlay */
.search-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #1a1a1a; z-index: 100; display: none;
  flex-direction: column;
}
.search-overlay.active { display: flex; }
.search-bar {
  display: flex; gap: 4px; padding: 6px;
  background: #222; border-bottom: 1px solid #333;
}
.search-bar input {
  flex: 1; background: #2a2a2a; color: #e0e0e0;
  border: 1px solid #444; border-radius: 4px;
  padding: 6px 8px; font-size: 14px; outline: none;
}
.search-results {
  flex: 1; overflow-y: auto; padding: 4px;
}
.search-result {
  padding: 8px; border-bottom: 1px solid #333; cursor: pointer;
}
.search-result:active { background: #333; }
.search-result .title { font-size: 12px; color: #bb86fc; }
.search-result .snippet { font-size: 11px; color: #888; margin-top: 2px; }
.search-result .page { font-size: 10px; color: #666; }

/* Custom dropdown (select doesn't work in overlay WebView) */
.nb-picker {
  flex: 1; position: relative; min-width: 0;
}
.nb-picker-btn {
  width: 100%; background: #2a2a2a; color: #e0e0e0;
  border: 1px solid #444; border-radius: 4px;
  padding: 3px 20px 3px 6px; font-size: 12px; text-align: left;
  cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.nb-picker-btn::after {
  content: '▼'; position: absolute; right: 6px; top: 50%;
  transform: translateY(-50%); font-size: 8px; color: #888;
}
.nb-dropdown {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
  max-height: 200px; overflow-y: auto; z-index: 50;
}
.nb-dropdown.open { display: block; }
.nb-dropdown-item {
  padding: 8px; font-size: 12px; cursor: pointer;
  border-bottom: 1px solid #333;
}
.nb-dropdown-item:active, .nb-dropdown-item.selected { background: #444; }

/* Preview modal */
.preview-modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92); z-index: 200; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 12px;
}
.preview-modal.active { display: flex; }
.preview-close {
  position: absolute; top: 8px; right: 12px;
  background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
}
.preview-delete {
  position: absolute; top: 8px; left: 12px;
  background: #cf6679; border: none; color: #fff; font-size: 12px;
  padding: 4px 10px; border-radius: 4px; cursor: pointer;
}
.preview-content {
  max-width: 100%; max-height: 80%; overflow: auto; text-align: center;
}
.preview-content img { max-width: 100%; max-height: 70vh; border-radius: 4px; }
.preview-info {
  margin-top: 8px; font-size: 12px; color: #aaa; text-align: center;
}
.preview-info a { color: #bb86fc; }
.preview-info .loc-coords { font-size: 11px; color: #888; }

/* Hidden file inputs */
.hidden-input { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="nb-picker">
      <div class="nb-picker-btn" id="nbPickerBtn" onclick="toggleNbDropdown()">ノート</div>
      <div class="nb-dropdown" id="nbDropdown"></div>
    </div>
    <div class="page-nav">
      <button class="btn btn-icon" onclick="prevPage()">◀</button>
      <span id="pageInfo">1/100</span>
      <button class="btn btn-icon" onclick="nextPage()">▶</button>
    </div>
    <button class="btn btn-green btn-icon" onclick="createNote()" title="新規">+</button>
    <button class="btn btn-icon" onclick="toggleLines()" id="linesBtn" title="罫線">≡</button>
  </div>

  <div class="att-bar" id="attBar"></div>

  <div class="editor-wrap">
    <textarea id="editor" placeholder="メモを入力..."></textarea>
  </div>

  <div class="footer">
    <div class="footer-left" id="status">ready</div>
    <div class="footer-right">
      <button class="btn btn-icon" onclick="insertTimestamp()" title="時刻">🕐</button>
      <button class="btn btn-icon" onclick="pickImage()" title="画像">📷</button>
      <button class="btn btn-icon" onclick="pickFile()" title="ファイル">📎</button>
      <button class="btn btn-icon" onclick="addLocation()" title="位置">📍</button>
      <button class="btn btn-icon" onclick="openSearch()" title="検索">🔍</button>
    </div>
  </div>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input id="searchInput" placeholder="検索..." oninput="doSearch()">
    <button class="btn" onclick="closeSearch()">✕</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Preview modal -->
<div class="preview-modal" id="previewModal">
  <button class="preview-close" onclick="closePreview()">✕</button>
  <button class="preview-delete" id="previewDeleteBtn" onclick="deletePreviewAtt()">削除</button>
  <div class="preview-content" id="previewContent"></div>
  <div class="preview-info" id="previewInfo"></div>
</div>

<script>
// Global error handler — catches ALL JS errors
window.onerror = function(msg, src, line, col, err) {
  const log = 'JS_ERROR: ' + msg + ' at ' + src + ':' + line + ':' + col;
  console.error(log);
  try { document.getElementById('status').textContent = log; } catch(e) {}
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  const log = 'JS_PROMISE_ERROR: ' + (e.reason?.message || e.reason || 'unknown');
  console.error(log);
  try { document.getElementById('status').textContent = log; } catch(ex) {}
});

// State
let notebooks = [];
let currentNbId = null;
let currentMeta = null;
let currentPage = 1;
let totalPages = 100;
let showLines = false;
let saveTimer = null;
let attachments = []; // current page attachments

const $ = id => document.getElementById(id);

function log(msg) {
  console.log('[overlay] ' + msg);
}

// ==========================================
// Init
// ==========================================
async function init() {
  try {
    log('init start, NotesBridge=' + (typeof NotesBridge));
    if (typeof NotesBridge === 'undefined') {
      $('status').textContent = 'error: NotesBridge not available';
      return;
    }
    await loadNotebookList();
    log('init complete, notebooks=' + notebooks.length);
    $('status').textContent = 'ready';
  } catch (e) {
    log('init ERROR: ' + e.message + '\n' + e.stack);
    $('status').textContent = 'error: ' + e.message;
  }
}

// ==========================================
// Notebook management
// ==========================================
async function loadNotebookList() {
  log('loadNotebookList called');
  const raw = NotesBridge.listNotebooks();
  log('listNotebooks returned: ' + raw.substring(0, 200));
  notebooks = JSON.parse(raw);

  renderNbDropdown();

  if (notebooks.length > 0) {
    currentNbId = notebooks[0].id;
    $('nbPickerBtn').textContent = notebooks[0].title;
    await loadNotebook(currentNbId);
  } else {
    await createNote();
  }
}

function renderNbDropdown() {
  const dd = $('nbDropdown');
  dd.innerHTML = '';
  for (const nb of notebooks) {
    const item = document.createElement('div');
    item.className = 'nb-dropdown-item' + (nb.id === currentNbId ? ' selected' : '');
    item.textContent = nb.title;
    item.onclick = function(e) {
      e.stopPropagation();
      closeNbDropdown();
      selectNotebook(nb.id);
    };
    dd.appendChild(item);
  }
}

function toggleNbDropdown() {
  const dd = $('nbDropdown');
  dd.classList.toggle('open');
}

function closeNbDropdown() {
  $('nbDropdown').classList.remove('open');
}

async function selectNotebook(id) {
  log('selectNotebook: ' + id);
  await saveCurrent();
  const nb = notebooks.find(n => n.id === id);
  if (nb) $('nbPickerBtn').textContent = nb.title;
  await loadNotebook(id);
}

async function loadNotebook(id) {
  log('loadNotebook: ' + id);
  currentNbId = id;
  const raw = NotesBridge.getNotebookMeta(id);
  log('meta: ' + raw.substring(0, 200));
  currentMeta = JSON.parse(raw);
  currentPage = currentMeta.currentPage || 1;
  totalPages = currentMeta.totalPages || 100;
  showLines = currentMeta.showLines || false;
  applyLines();
  await loadPage();
}

async function loadPage() {
  if (!currentNbId) return;
  const content = NotesBridge.getPage(currentNbId, currentPage);
  $('editor').value = content || '';
  updatePageInfo();
  loadAttachments();
}

function updatePageInfo() {
  $('pageInfo').textContent = currentPage + '/' + totalPages;
}

async function createNote() {
  const title = 'メモ ' + new Date().toLocaleString('ja-JP', {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
  log('createNote: ' + title);
  const id = NotesBridge.createNotebook(title);
  if (id) {
    await loadNotebookList();
    $('nbPickerBtn').textContent = title;
    await loadNotebook(id);
    $('editor').focus();
  }
}

// ==========================================
// Page navigation
// ==========================================
function prevPage() {
  if (currentPage > 1) {
    saveCurrent();
    currentPage--;
    loadPage();
  }
}

function nextPage() {
  if (currentPage < totalPages) {
    saveCurrent();
    currentPage++;
    loadPage();
  }
}

// ==========================================
// Save
// ==========================================
function saveCurrent() {
  if (!currentNbId) return;
  const content = $('editor').value;
  log('savePage nb=' + currentNbId + ' p=' + currentPage + ' len=' + content.length);
  NotesBridge.savePage(currentNbId, currentPage, content);

  // Save currentPage to meta
  if (currentMeta) {
    currentMeta.currentPage = currentPage;
    NotesBridge.updateNotebookMeta(currentNbId, JSON.stringify(currentMeta));
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveCurrent();
    $('status').textContent = 'saved ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }, 800);
}

// ==========================================
// Ruled lines
// ==========================================
function applyLines() {
  const editor = $('editor');
  if (showLines) {
    editor.classList.add('ruled');
    $('linesBtn').style.color = '#bb86fc';
  } else {
    editor.classList.remove('ruled');
    $('linesBtn').style.color = '#ccc';
  }
}

function toggleLines() {
  showLines = !showLines;
  applyLines();
  if (currentMeta) {
    currentMeta.showLines = showLines;
    NotesBridge.updateNotebookMeta(currentNbId, JSON.stringify(currentMeta));
  }
}

// ==========================================
// Timestamp
// ==========================================
function insertTimestamp() {
  const editor = $('editor');
  const now = new Date().toLocaleString('ja-JP');
  const pos = editor.selectionStart;
  const text = editor.value;
  editor.value = text.slice(0, pos) + '\n[' + now + ']\n' + text.slice(pos);
  editor.selectionStart = editor.selectionEnd = pos + now.length + 4;
  editor.focus();
  scheduleSave();
}

// ==========================================
// Attachments
// ==========================================
function loadAttachments() {
  if (!currentNbId) return;
  const raw = NotesBridge.getAttachments(currentNbId, currentPage);
  attachments = JSON.parse(raw);
  renderAttachments();
}

function renderAttachments() {
  const bar = $('attBar');
  bar.innerHTML = '';
  attachments.forEach((att, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'att-thumb';
    thumb.onclick = () => previewAttachment(att);

    if (att.type === 'image') {
      const dataUrl = NotesBridge.getAttachmentDataUrl(currentNbId, att.id, att.ext);
      if (dataUrl) {
        const img = document.createElement('img');
        img.src = dataUrl;
        thumb.appendChild(img);
      } else {
        thumb.textContent = '📷';
      }
    } else if (att.type === 'location') {
      thumb.textContent = '📍';
    } else {
      thumb.textContent = '📎';
    }

    const badge = document.createElement('div');
    badge.className = 'att-badge';
    badge.textContent = i + 1;
    thumb.appendChild(badge);

    bar.appendChild(thumb);
  });
}

let previewingAtt = null;

function previewAttachment(att) {
  previewingAtt = att;
  const content = $('previewContent');
  const info = $('previewInfo');
  content.innerHTML = '';
  info.innerHTML = '';

  if (att.type === 'image') {
    const dataUrl = NotesBridge.getAttachmentDataUrl(currentNbId, att.id, att.ext);
    if (dataUrl) {
      content.innerHTML = '<img src="' + dataUrl + '">';
      info.innerHTML = att.name || '画像';
    }
  } else if (att.type === 'location') {
    const data = NotesBridge.getAttachmentDataUrl(currentNbId, att.id, '.json');
    if (data) {
      const loc = JSON.parse(data);
      const addr = loc.address?.display_name || '';
      const mapsUrl = 'https://maps.google.com/maps?q=' + loc.latitude + ',' + loc.longitude;
      content.innerHTML = '<div style="font-size:48px;margin:20px 0">📍</div>';
      info.innerHTML = (addr ? '<div>' + escHtml(addr) + '</div>' : '')
        + '<div class="loc-coords">' + loc.latitude.toFixed(6) + ', ' + loc.longitude.toFixed(6)
        + ' (±' + Math.round(loc.accuracy) + 'm)</div>'
        + '<div style="margin-top:8px"><a href="' + mapsUrl + '" target="_blank">Google Mapsで開く</a></div>';
    }
  } else if (att.type === 'file') {
    content.innerHTML = '<div style="font-size:48px;margin:20px 0">📎</div>';
    info.innerHTML = '<div>' + escHtml(att.name || 'ファイル') + '</div>';
  }

  $('previewModal').classList.add('active');
}

function closePreview() {
  $('previewModal').classList.remove('active');
  previewingAtt = null;
}

function deletePreviewAtt() {
  if (!previewingAtt) return;
  if (!confirm('この添付を削除しますか？')) return;
  NotesBridge.deleteAttachment(currentNbId, previewingAtt.id);
  closePreview();
  loadAttachments();
  $('status').textContent = '添付を削除しました';
}

function pickImage() {
  log('pickImage via NotesBridge');
  window._onImagePicked = function(result) {
    log('image picked: ' + (result.error || result.cancelled || result.name));
    if (result.error || result.cancelled) { $('status').textContent = result.error || 'キャンセル'; return; }
    const attId = NotesBridge.saveImageAttachment(currentNbId, currentPage, result.base64, result.name);
    if (attId) {
      insertRef('画像', attachments.length + 1);
      loadAttachments();
      $('status').textContent = '画像を追加しました';
    }
  };
  NotesBridge.pickFile('image/*', 'window._onImagePicked');
}

function pickFile() {
  log('pickFile via NotesBridge');
  window._onFilePicked = function(result) {
    log('file picked: ' + (result.error || result.cancelled || result.name));
    if (result.error || result.cancelled) { $('status').textContent = result.error || 'キャンセル'; return; }
    const attId = NotesBridge.saveFileAttachment(currentNbId, currentPage, result.base64, result.name, result.mimeType);
    if (attId) {
      insertRef('ファイル', attachments.length + 1);
      loadAttachments();
      $('status').textContent = 'ファイルを追加しました';
    }
  };
  NotesBridge.pickFile('*/*', 'window._onFilePicked');
}

function addLocation() {
  $('status').textContent = '位置情報取得中...';
  log('addLocation called');

  // Use NotesBridge native location (Android LocationManager)
  window._onLocationResult = async function(result) {
    log('location result: ' + JSON.stringify(result));
    if (result.error) {
      $('status').textContent = '位置取得失敗: ' + result.error;
      return;
    }

    const locData = {
      latitude: result.latitude,
      longitude: result.longitude,
      accuracy: result.accuracy,
      address: null
    };

    // Reverse geocode
    try {
      const resp = await fetch(
        'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
        locData.latitude + '&lon=' + locData.longitude + '&accept-language=ja',
        { headers: { 'User-Agent': 'ToshiyukiNote/1.0' } }
      );
      locData.address = await resp.json();
    } catch (e) { log('geocode error: ' + e.message); }

    const attId = NotesBridge.saveLocationAttachment(currentNbId, currentPage, JSON.stringify(locData));
    if (attId) {
      insertRef('現在地', attachments.length + 1);
      loadAttachments();
    }
    $('status').textContent = '位置情報を追加しました';
  };

  NotesBridge.getLocation('window._onLocationResult');
}

function insertRef(label, num) {
  const editor = $('editor');
  const pos = editor.selectionStart || editor.value.length;
  const text = editor.value;
  const ref = ' (' + label + num + ') ';
  editor.value = text.slice(0, pos) + ref + text.slice(pos);
  editor.focus();
  scheduleSave();
}

// ==========================================
// Search
// ==========================================
function openSearch() {
  $('searchOverlay').classList.add('active');
  $('searchInput').focus();
}

function closeSearch() {
  $('searchOverlay').classList.remove('active');
  $('searchInput').value = '';
  $('searchResults').innerHTML = '';
}

function doSearch() {
  const query = $('searchInput').value.trim();
  if (!query) { $('searchResults').innerHTML = ''; return; }

  const raw = NotesBridge.search(query);
  const results = JSON.parse(raw);

  const container = $('searchResults');
  container.innerHTML = '';

  if (results.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#666">見つかりませんでした</div>';
    return;
  }

  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'search-result';
    div.innerHTML = '<div class="title">' + escHtml(r.notebookTitle) + '</div>'
      + '<div class="page">p.' + r.pageNumber + '</div>'
      + '<div class="snippet">' + escHtml(r.snippet) + '</div>';
    div.onclick = async () => {
      closeSearch();
      // Switch to that notebook and page
      $('nbSelect').value = r.notebookId;
      await loadNotebook(r.notebookId);
      currentPage = r.pageNumber;
      await loadPage();
    };
    container.appendChild(div);
  });
}

// ==========================================
// Swipe gesture for page navigation
// ==========================================
let touchStartX = 0;
let touchStartY = 0;

$('editor').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

$('editor').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy) * 2) {
    if (dx > 0) prevPage();
    else nextPage();
  }
}, { passive: true });

// ==========================================
// Utilities
// ==========================================
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      resolve(result.split(',')[1]); // Remove data URL prefix
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ==========================================
// Event listeners
// ==========================================
$('editor').addEventListener('input', scheduleSave);

// Close dropdown when tapping elsewhere
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nb-picker')) closeNbDropdown();
});

// Init
init();
</script>
</body>
</html>
